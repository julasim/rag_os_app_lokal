# =============================================================================
# RAG OS — Standalone-Override
#
# Bringt einen eigenen rag-caddy für TLS-Terminierung + Domain-Routing mit.
# Verwenden, wenn KEIN zentraler julasim/Proxy-Edge-Caddy parallel läuft
# (z.B. Single-Stack-VPS oder lokales Testing mit eigener Domain).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
#
# Was dieses Override macht:
#   - Hebelt das `external: true` des proxy-Netzes auf, weil ohne Edge-Caddy
#     niemand das proxy-Netz von außen anlegt
#   - Ergänzt den rag-caddy-Service (belegt Host-Ports 80 + 443)
#   - Bringt die Volumes caddy-data + caddy-config zurück
#
# Routing-Logik bleibt im Caddyfile dokumentiert (gleiche Datei wie im Edge-
# Mode der zentrale Caddy nutzt, mit identischen handle-Blöcken).
# =============================================================================

networks:
  # Im Edge-Mode external — hier lokal anlegen lassen,
  # damit Standalone unabhängig vom julasim/Proxy-Stack hochfährt.
  proxy:
    external: false
    driver: bridge

volumes:
  caddy-data:
  caddy-config:

services:

  # ---------------------------------------------------------------------------
  # Eigener Caddy — HTTPS-Terminierung + Reverse-Proxy auf rag-api
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2
    container_name: rag-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      RAG_DOMAIN: ${RAG_DOMAIN}
    networks:
      - rag-net
    depends_on:
      - api
