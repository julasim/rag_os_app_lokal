# =============================================================================
# Off-Site-Backup — zentrale Konfiguration.
#
# Das ist die EINZIGE Datei, die du anpassen musst. Sowohl der manuelle Auslöser
# (offsite-backup-now.sh) als auch der Auto-Trigger beim Anstecken lesen sie.
# Nach dem Ändern ist KEINE Neuinstallation nötig.
# =============================================================================

# Name (Dateisystem-Label) der externen Backup-Platte.
# So benennst du eine ext4-Platte:  sudo e2label /dev/sdX1 RAG-BACKUP
# (exFAT:  sudo exfatlabel /dev/sdX1 RAG-BACKUP)
RAG_BACKUP_LABEL="RAG-BACKUP"

# Verschlüsselung (empfohlen — die Dumps enthalten Passwort-/Key-Hashes).
# Leer = unverschlüsselt. Sonst die GPG-Empfänger-Key-ID/E-Mail eintragen.
RAG_BACKUP_GPG_RECIPIENT=""

# Aufbewahrung auf der externen Platte in Tagen (0 = nie löschen).
RAG_BACKUP_EXTERNAL_KEEP_DAYS=90
