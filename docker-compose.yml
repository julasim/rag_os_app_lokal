# =============================================================================
# RAG OS — Docker Compose (Edge-Mode, Default)
#
# Standard-Setup: rag-api hängt am externen `proxy`-Docker-Netzwerk, in dem
# der zentrale Edge-Caddy (Repo julasim/Proxy unter /opt/Proxy auf dem VPS)
# läuft und für ALLE App-Stacks (KI_WIKI, Bau-OS, RAG_OS, ...) die TLS-
# Terminierung + das Domain-Routing übernimmt.
#
# Voraussetzungen:
#   - `proxy`-Netzwerk existiert bereits auf dem Host
#     (legt der julasim/Proxy-Stack an)
#   - Im Edge-Caddyfile gibt es einen Block, der die RAG-Domain auf
#     rag-api:8000  (für /api/*, /mcp/* und / = React-UI)
#     routet
#
# Start:
#   docker compose up -d
#
# Für Setups OHNE zentralen Edge-Caddy gibt es den Standalone-Override:
#   docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d
#
# Beide Modi exposen rag-api intern auf 8000 — der Unterschied liegt
# nur darin, wer die TLS-Terminierung und das Domain-Routing macht.
# =============================================================================

name: sima-rag

networks:
  rag-net:
    driver: bridge

  # Wird vom zentralen Edge-Caddy-Stack (julasim/Proxy) angelegt.
  # Im Standalone-Override wird dieses Flag aufgehoben.
  proxy:
    external: true

volumes:
  qdrant-data:
  postgres-data:
  ollama-data:

services:

  # ---------------------------------------------------------------------------
  # API — FastAPI + React-UI + MCP, ein Prozess via supervisord
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .                     # Root — Node-Build braucht frontend/
      dockerfile: app/Dockerfile
    image: sima-rag-api:latest       # schlankes Serving-Image (torch-frei, ONNX-Reranker);
                                     # zugleich FROM-Basis für app/Dockerfile.ingest
    container_name: rag-api
    restart: unless-stopped
    expose:
      - "8000"   # FastAPI (REST unter /api/*, MCP unter /mcp/*, React-UI unter /)
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      # Ollama
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: bge-m3
      LLM_MODEL: qwen2.5:3b-instruct
      # App
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /data/uploads
      LOG_LEVEL: INFO
      RAG_DOMAIN: ${RAG_DOMAIN}
      # Modell-Cache auf ein persistentes Verzeichnis legen (siehe volumes),
      # damit der ~2,4-GB-Reranker + BM25 NICHT nach jedem Redeploy neu aus dem
      # Netz geladen werden. Deterministische Pfade statt ~/.cache.
      HF_HOME: /models/huggingface
      SENTENCE_TRANSFORMERS_HOME: /models/huggingface
      FASTEMBED_CACHE_PATH: /models/fastembed
      # Optional
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ./config:/config:ro             # projects.yml, project_defaults.yml
      - ./data/uploads:/data/uploads    # Originaldateien
      - ./data/staging:/data/staging    # Async-Upload-Staging, GETEILT mit rag-ingest (Track C3b)
      - ./data/backups:/data/backups    # Postgres-Dumps + Qdrant-Snapshots
      - ./data/models:/models           # Reranker/HF + fastembed Cache (überlebt Redeploys, uid 1000)
    networks:
      - rag-net      # Backend-Services (postgres, qdrant, ollama)
      - proxy        # Edge-Caddy erreicht rag-api hier
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "4.0"                 # M2 (Track A0): mehr Parallelität für
                                     # ONNX-Reranker + BM25 + Ollama-Client
          # 3 GB (M1.3): der Reranker läuft jetzt als INT8-ONNX (bge-reranker-v2-m3,
          # ~0,6 GB statt ~2,4 GB torch) — das Serving-Image ist torch-frei. 3 GB
          # decken ONNX-Session + BM25/fastembed + Ollama-Client komfortabel ab.
          # Auf der Ziel-VPS an reale Hardware anpassen; bei RAM-Knappheit
          # RERANK_ENABLED=false setzen (Qualität etwas geringer).
          memory: 3g

  # ---------------------------------------------------------------------------
  # Qdrant — Vector-Datenbank
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.18.2   # gepinnt (nicht :latest) — Reproduzierbarkeit/Supply-Chain
    container_name: rag-qdrant
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    # Healthcheck ohne curl (nicht im Image): TCP-Verbindungstest via bash.
    # Bestätigt, dass Qdrant den REST-Port bedient, bevor die API startet.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    networks:
      - rag-net

  # ---------------------------------------------------------------------------
  # Ollama — Embedding-Modell (BGE-M3) + LLM (Qwen 2.5 3B)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.31.1   # gepinnt (nicht :latest) — Reproduzierbarkeit/Supply-Chain
    container_name: rag-ollama
    restart: unless-stopped
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"      # bge-m3/Qwen ganztags im RAM halten (kein Reload je Query)
      OLLAMA_NUM_PARALLEL: "1"      # Single-User → spart KV-Cache-RAM
    # Healthcheck via ollama-CLI (im Image vorhanden). `ollama ps` antwortet,
    # sobald der Server bereit ist.
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
    networks:
      - rag-net

  # ---------------------------------------------------------------------------
  # Postgres — Metadaten, User, API-Keys, Job-Logs
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: rag-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    networks:
      - rag-net
